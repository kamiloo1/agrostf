# ============================================
# Perfil Railway: producción en railway.app
# Activar con: SPRING_PROFILES_ACTIVE=railway
# ============================================

# Puerto: Railway inyecta PORT; si no existe (local) usa 8085
server.port=${PORT:8085}
# Escuchar en todas las interfaces (necesario en Railway/contenedores)
server.address=0.0.0.0
# Usar cabeceras X-Forwarded-* del proxy para construir URLs públicas correctas.
server.forward-headers-strategy=framework

# Base de datos (elegir una opción):
# A) MySQL de Railway: referenciar MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD desde el servicio MySQL.
# B) MySQL externo (PlanetScale, Aiven, etc.): definir SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool (opcional)
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=10

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.sql.init.mode=never
spring.main.allow-circular-references=true

# Sesión y cookies (producción: usar HTTPS)
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
app.session.timeout.minutes=30

# Thymeleaf: cache en producción
spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600

# Logging: solo consola (en Railway no hay carpeta logs/ con permisos)
logging.level.root=INFO
logging.level.com.example.agrosoft1=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security.web.authentication=INFO
logging.level.org.springframework.security.authentication=INFO
# Log en /tmp (escribible en contenedor; evita error con logs/agrosoft.log)
logging.file.name=/tmp/agrosoft.log

# Correo: OBLIGATORIO definir en Railway (Variables):
#   SPRING_MAIL_USERNAME = tu Gmail (ej: mi cuenta@gmail.com)
#   SPRING_MAIL_PASSWORD = contraseña de aplicación de Gmail (16 caracteres)
# Sin estas variables la app puede fallar al arrancar.

# Correo en Railway: SMTP 587 suele estar bloqueado en planes Free/Hobby/Trial.
# Opción recomendada: Resend por HTTPS (variable RESEND_API_KEY).
# https://resend.com — crear API key; para pruebas usar remitente onboarding@resend.dev
app.resend.api.key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:onboarding@resend.dev}

# SMTP opcional (p. ej. servidor Pro con puertos desbloqueados o proveedor externo)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Timeouts SMTP para evitar solicitudes colgadas por correo en producción.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.clima.api.key=${APP_CLIMA_API_KEY:demo_key}
app.clima.api.url=https://api.openweathermap.org/data/2.5
