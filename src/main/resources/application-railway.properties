# ============================================
# Perfil Railway: producción en railway.app
# Activar con: SPRING_PROFILES_ACTIVE=railway
# ============================================

# Puerto: Railway inyecta PORT; si no existe (local) usa 8085
server.port=${PORT:8085}

# Base de datos: en Railway añadir servicio "MySQL" y referenciar sus variables en tu app
# Variables que expone Railway MySQL: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool (opcional)
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=10

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.sql.init.mode=never
spring.main.allow-circular-references=true

# Sesión y cookies (producción: usar HTTPS)
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
app.session.timeout.minutes=30

# Thymeleaf: cache en producción
spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600

# Logging: menos verbose
logging.level.root=INFO
logging.level.com.example.agrosoft1=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/agrosoft.log

# Correo y API clima: definir en Railway (Variables)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.clima.api.key=${APP_CLIMA_API_KEY:demo_key}
app.clima.api.url=https://api.openweathermap.org/data/2.5
