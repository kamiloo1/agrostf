# ============================================
# Perfil Render.com (Docker / Web Service)
# Activar con: SPRING_PROFILES_ACTIVE=render
# Variables: PORT, MySQL (Railway-style o SPRING_DATASOURCE_*), RESEND_*
# ============================================

server.port=${PORT:8085}
server.address=0.0.0.0
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.sql.init.mode=never
spring.main.allow-circular-references=true

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
app.session.timeout.minutes=30

spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600

logging.level.root=INFO
logging.level.com.example.agrosoft1=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security.web.authentication=INFO
logging.level.org.springframework.security.authentication=INFO
logging.file.name=/tmp/agrosoft.log

app.resend.api.key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:onboarding@resend.dev}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.clima.api.key=${APP_CLIMA_API_KEY:demo_key}
app.clima.api.url=https://api.openweathermap.org/data/2.5
