<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambiar contraseña - AgroSoft</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --verde:#2F5D39;
  --verde-oscuro:#1e4620;
  --verde-claro:#e8f5f0;
  --gris-borde:#e9ecef;
  --texto:#1a1a1a;
  --texto-suave:#6c757d;
  --rojo:#dc3545;
  --naranja:#fd7e14;
  --blanco:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  display:flex;
  min-height:100vh;
  color:var(--texto);
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:240px;
  height:100vh;
  background:linear-gradient(180deg,var(--verde),var(--verde-oscuro));
  padding:30px 20px;
  color:white;
}

.sidebar-header{
  text-align:center;
  margin-bottom:20px;
}

.sidebar-header h1{
  display:flex;
  justify-content:center;
  gap:8px;
  font-size:20px;
}

.role-badge{
  display:inline-block;
  padding:4px 12px;
  margin-top:8px;
  background:rgba(255,255,255,.15);
  border-radius:12px;
  font-size:11px;
}

.nav-menu{list-style:none}
.nav-menu li{margin-bottom:8px}

.nav-menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  color:rgba(255,255,255,.85);
  text-decoration:none;
  border-radius:8px;
  transition:.3s;
}

.nav-menu a:hover,
.nav-menu a.active{
  background:rgba(255,255,255,.18);
  color:white;
}

.nav-menu a.dashboard-btn{
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.08);
  font-weight:600;
  margin-bottom:4px;
}
.nav-menu a.dashboard-btn:hover{ background:rgba(255,255,255,.2); }

/* MAIN - Fondo con imagen visible */
.main-content{
  margin-left:240px;
  flex:1;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,#a5d6a7 0%,#c8e6c9 40%,#e8f5e9 100%);
}

.main-content::before{
  content:'';
  position:absolute;
  inset:0;
  background:url('https://images.unsplash.com/photo-1545300329-e785e923ed45?w=1920&q=80'),url('/images/FONDODEFINITIVO.JPG') center/cover no-repeat;
  background-size:cover;
  background-position:center;
  filter:blur(3px) brightness(0.98) saturate(1.15);
  transform:scale(1.05);
  z-index:0;
}

.main-content::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(160deg,rgba(232,245,240,.28) 0%,rgba(255,255,255,.22) 50%,rgba(200,230,201,.3) 100%);
  z-index:1;
}

.content-wrap{
  position:relative;
  z-index:2;
  width:100%;
  max-width:520px;
}

/* CARD */
.card{
  background:var(--blanco);
  border-radius:20px;
  padding:40px;
  box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.card h2{
  color:var(--verde);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:10px;
}

.sub{
  color:var(--texto-suave);
  font-size:14px;
  margin-bottom:25px;
}

.feedback{
  padding:12px;
  border-radius:10px;
  margin-bottom:20px;
  font-size:14px;
}

.feedback.error{
  background:#f8d7da;
  color:#721c24;
}

.feedback.success{
  background:var(--verde-claro);
  color:var(--verde-oscuro);
}

/* FORM */
.form-group{margin-bottom:20px}

.form-group label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  display:block;
}

.input-wrap{
  position:relative;
}

.input-wrap i.left{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--texto-suave);
}

.toggle-pass{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  cursor:pointer;
  color:var(--texto-suave);
  font-size:18px;
}

input{
  width:100%;
  padding:14px 44px 14px 46px;
  border:1px solid var(--gris-borde);
  border-radius:12px;
  font-size:15px;
  background:#fafafa;
  transition:.2s;
}

input:focus{
  outline:none;
  border-color:var(--verde);
  box-shadow:0 0 0 3px rgba(47,93,57,.15);
  background:white;
}

/* STRENGTH */
.strength-bar{
  display:flex;
  height:6px;
  border-radius:3px;
  overflow:hidden;
  background:#eee;
  margin-top:8px;
}

.strength-bar span{
  flex:1;
  transition:.3s;
}

.weak{background:var(--rojo)}
.medium{background:var(--naranja)}
.strong{background:var(--verde)}

/* BUTTONS */
.btn-wrap{
  display:flex;
  gap:12px;
  margin-top:25px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:12px;
  font-weight:600;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  text-decoration:none;
  cursor:pointer;
  transition:.3s;
}

.btn-primary{
  background:var(--verde);
  color:white;
  border:none;
}

.btn-primary:hover{
  background:var(--verde-oscuro);
  transform:translateY(-2px);
}

.btn-secondary{
  background:#e9ecef;
  color:#333;
}

.btn-secondary:hover{
  background:#dee2e6;
}

@media(max-width:768px){
  .sidebar{display:none}
  .main-content{margin-left:0}
}
</style>
</head>

<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1><i class="ri-leaf-line"></i> AgroSoft</h1>
    <span class="role-badge">Mi cuenta</span>
  </div>

  <ul class="nav-menu">
    <li><a th:href="@{/dashboard}" class="dashboard-btn"><i class="ri-dashboard-line"></i> Ver Dashboard</a></li>
    <li><a th:href="@{/cuenta}"><i class="ri-user-settings-line"></i> Mi cuenta</a></li>
    <li><a th:href="@{/cuenta/cambiar-password}" class="active"><i class="ri-lock-password-line"></i> Cambiar contraseña</a></li>
    <li><a th:href="@{/logout}"><i class="ri-logout-box-r-line"></i> Cerrar sesión</a></li>
  </ul>
</aside>

<div class="main-content">
<div class="content-wrap">
<div class="card">

<h2><i class="ri-lock-password-line"></i> Cambiar contraseña</h2>
<p class="sub" th:text="${correo != null ? correo : '—'}"></p>

<div th:if="${error}" class="feedback error" th:text="${error}"></div>
<div th:if="${success}" class="feedback success" th:text="${success}"></div>

<form th:action="@{/cuenta/cambiar-password}" method="post" id="formPassword">

<div class="form-group">
<label>Contraseña actual</label>
<div class="input-wrap">
<i class="ri-lock-line left"></i>
<input type="password" id="actual" name="contrasenaActual" required>
<button type="button" class="toggle-pass" onclick="togglePassword('actual',this)">
<i class="ri-eye-line"></i>
</button>
</div>
</div>

<div class="form-group">
<label>Nueva contraseña</label>
<div class="input-wrap">
<i class="ri-lock-line left"></i>
<input type="password" id="nueva" name="contrasenaNueva" required>
<button type="button" class="toggle-pass" onclick="togglePassword('nueva',this)">
<i class="ri-eye-line"></i>
</button>
</div>
<div class="strength-bar">
<span id="s1"></span>
<span id="s2"></span>
<span id="s3"></span>
</div>
</div>

<div class="form-group">
<label>Confirmar contraseña</label>
<div class="input-wrap">
<i class="ri-lock-line left"></i>
<input type="password" id="confirmar" name="contrasenaConfirmar" required>
<button type="button" class="toggle-pass" onclick="togglePassword('confirmar',this)">
<i class="ri-eye-line"></i>
</button>
</div>
</div>

<div class="btn-wrap">
<button type="submit" class="btn btn-primary">
<i class="ri-check-line"></i> Actualizar
</button>

<a th:href="@{/cuenta}" class="btn btn-secondary">
<i class="ri-arrow-left-line"></i> Volver
</a>
</div>

</form>
</div>
</div>
</div>

<script>
(function(){

const form = document.getElementById("formPassword");
const nueva = document.getElementById("nueva");
const confirmar = document.getElementById("confirmar");
const s1 = document.getElementById("s1");
const s2 = document.getElementById("s2");
const s3 = document.getElementById("s3");

window.togglePassword = function(id,btn){
const input = document.getElementById(id);
const icon = btn.querySelector("i");
if(input.type==="password"){
input.type="text";
icon.className="ri-eye-off-line";
}else{
input.type="password";
icon.className="ri-eye-line";
}
}

function strengthScore(v){
let score=0;
if(v.length>=6) score++;
if(/[A-Z]/.test(v)) score++;
if(/[0-9]/.test(v)) score++;
if(/[^A-Za-z0-9]/.test(v)) score++;
return score;
}

function updateStrength(){
const v=nueva.value;
s1.className=s2.className=s3.className="";
const score=strengthScore(v);

if(score<=1){ s1.classList.add("weak"); }
else if(score<=3){ s1.classList.add("medium"); s2.classList.add("medium"); }
else{ s1.classList.add("strong"); s2.classList.add("strong"); s3.classList.add("strong"); }
}

function validateMatch(){
if(confirmar.value==="") return;
if(nueva.value!==confirmar.value){
confirmar.style.borderColor="var(--rojo)";
}else{
confirmar.style.borderColor="var(--verde)";
}
}

nueva.addEventListener("input",updateStrength);
confirmar.addEventListener("input",validateMatch);

form.addEventListener("submit",function(e){
if(nueva.value!==confirmar.value){
e.preventDefault();
alert("Las contraseñas no coinciden");
return;
}
if(strengthScore(nueva.value)<2){
e.preventDefault();
alert("La contraseña es demasiado débil");
}
});

})();
</script>

</body>
</html>
