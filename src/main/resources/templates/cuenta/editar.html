<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar perfil - AgroSoft</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --verde:#2F5D39;
  --verde-oscuro:#1e4620;
  --verde-claro:#e8f5f0;
  --borde:#e9ecef;
  --gris:#6c757d;
  --blanco:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  display:flex;
  min-height:100vh;
  color:#1a1a1a;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:240px;
  height:100vh;
  background:linear-gradient(180deg,var(--verde),var(--verde-oscuro));
  padding:30px 20px;
  color:white;
}

.sidebar-header{
  text-align:center;
  padding-bottom:20px;
  border-bottom:1px solid rgba(255,255,255,.15);
  margin-bottom:20px;
}

.sidebar-header h1{
  font-size:20px;
  display:flex;
  justify-content:center;
  gap:8px;
}

.role-badge{
  margin-top:8px;
  display:inline-block;
  padding:4px 12px;
  background:rgba(255,255,255,.15);
  border-radius:20px;
  font-size:11px;
}

.nav-menu{list-style:none}
.nav-menu li{margin-bottom:8px}

.nav-menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  color:rgba(255,255,255,.85);
  text-decoration:none;
  border-radius:8px;
  transition:.3s;
}

.nav-menu a:hover,
.nav-menu a.active{
  background:rgba(255,255,255,.18);
  color:white;
}

.nav-menu a.dashboard-btn{
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.08);
  font-weight:600;
  margin-bottom:4px;
}
.nav-menu a.dashboard-btn:hover{ background:rgba(255,255,255,.2); }

/* MAIN */
.main-content{
  margin-left:240px;
  flex:1;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,#a5d6a7 0%,#c8e6c9 40%,#e8f5e9 100%);
}

.main-content::before{
  content:'';
  position:absolute;
  inset:0;
  background:url('https://images.unsplash.com/photo-1545300329-e785e923ed45?w=1920&q=80'),url('/images/FONDODEFINITIVO.JPG') center/cover no-repeat;
  background-size:cover;
  background-position:center;
  filter:blur(3px) brightness(0.98) saturate(1.15);
  transform:scale(1.05);
  z-index:0;
}

.main-content::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(160deg,rgba(232,245,240,.28) 0%,rgba(255,255,255,.22) 50%,rgba(200,230,201,.3) 100%);
  z-index:1;
}

.content-wrap{
  position:relative;
  z-index:2;
  width:100%;
  max-width:520px;
}

/* CARD */
.card{
  background:var(--blanco);
  border-radius:20px;
  padding:40px;
  box-shadow:0 15px 40px rgba(0,0,0,.15);
  animation:fadeIn .5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:translateY(0)}
}

.card h2{
  color:var(--verde);
  margin-bottom:25px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* FORM */
.form-group{
  margin-bottom:22px;
}

.form-group label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  display:block;
}

.input-wrapper{
  position:relative;
}

.input-wrapper i{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--gris);
  font-size:18px;
}

.form-group input{
  width:100%;
  padding:14px 14px 14px 44px;
  border:1px solid var(--borde);
  border-radius:12px;
  font-size:15px;
  background:#fafafa;
  transition:.2s;
}

.form-group input:focus{
  outline:none;
  border-color:var(--verde);
  box-shadow:0 0 0 3px rgba(47,93,57,.15);
  background:white;
}

.readonly{
  background:#f1f3f5 !important;
  color:var(--gris);
}

small{
  font-size:12px;
  color:var(--gris);
  margin-top:5px;
  display:block;
}

/* BOTONES */
.btn-wrap{
  display:flex;
  gap:12px;
  margin-top:25px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:12px;
  font-weight:600;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  text-decoration:none;
  transition:.3s;
  cursor:pointer;
}

.btn-primary{
  background:var(--verde);
  color:white;
  border:none;
}

.btn-primary:hover{
  background:var(--verde-oscuro);
  transform:translateY(-2px);
}

.btn-secondary{
  background:#e9ecef;
  color:#333;
}

.btn-secondary:hover{
  background:#dee2e6;
  transform:translateY(-2px);
}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .main-content{margin-left:0}
}
</style>
</head>

<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1><i class="ri-leaf-line"></i> AgroSoft</h1>
    <span class="role-badge">Editar Perfil</span>
  </div>

  <ul class="nav-menu">
    <li><a th:href="@{/dashboard}" class="dashboard-btn"><i class="ri-dashboard-line"></i> Ver Dashboard</a></li>
    <li><a th:href="@{/cuenta}"><i class="ri-user-settings-line"></i> Mi cuenta</a></li>
    <li><a th:href="@{/cuenta/editar}" class="active"><i class="ri-edit-line"></i> Editar perfil</a></li>
    <li><a th:href="@{/cuenta/cambiar-password}"><i class="ri-lock-password-line"></i> Cambiar contraseña</a></li>
    <li><a th:href="@{/logout}"><i class="ri-logout-box-r-line"></i> Cerrar sesión</a></li>
  </ul>
</aside>

<div class="main-content">
  <div class="content-wrap">
    <div class="card">
      <h2><i class="ri-edit-2-line"></i> Editar información</h2>

      <form th:action="@{/cuenta/editar}" method="post">

        <div class="form-group">
          <label>Nombre</label>
          <div class="input-wrapper">
            <i class="ri-user-line"></i>
            <input type="text" name="nombre" th:value="${nombre}" placeholder="Tu nombre completo">
          </div>
        </div>

        <div class="form-group">
          <label>Correo electrónico</label>
          <div class="input-wrapper">
            <i class="ri-mail-line"></i>
            <input type="text" th:value="${correo}" class="readonly" readonly disabled>
          </div>
          <small>El correo no se puede modificar.</small>
        </div>

        <div class="form-group">
          <label>Teléfono</label>
          <div class="input-wrapper">
            <i class="ri-phone-line"></i>
            <input type="text" name="telefono" th:value="${telefono}" placeholder="Ej: 300 123 4567">
          </div>
        </div>

        <div class="btn-wrap">
          <button type="submit" class="btn btn-primary">
            <i class="ri-check-line"></i> Guardar cambios
          </button>

          <a th:href="@{/cuenta}" class="btn btn-secondary">
            <i class="ri-arrow-left-line"></i> Cancelar
          </a>
        </div>

      </form>
    </div>
  </div>
</div>

</body>
</html>
