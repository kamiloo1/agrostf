<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi cuenta - AgroSoft</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --verde:#2F5D39;
  --verde-oscuro:#1e4620;
  --verde-claro:#e8f5f0;
  --gris:#6c757d;
  --borde:#e9ecef;
  --blanco:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  display:flex;
  min-height:100vh;
  color:#1a1a1a;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:240px;
  height:100vh;
  background:linear-gradient(180deg,var(--verde),var(--verde-oscuro));
  color:white;
  padding:30px 20px;
  box-shadow:4px 0 20px rgba(0,0,0,.08);
}

.sidebar-header{
  text-align:center;
  padding-bottom:20px;
  border-bottom:1px solid rgba(255,255,255,.15);
  margin-bottom:20px;
}

.sidebar-header h1{
  font-size:20px;
  display:flex;
  justify-content:center;
  gap:8px;
}

.role-badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 12px;
  background:rgba(255,255,255,.15);
  border-radius:20px;
  font-size:11px;
}

.nav-menu{list-style:none}
.nav-menu li{margin-bottom:8px}

.nav-menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  text-decoration:none;
  color:rgba(255,255,255,.85);
  border-radius:8px;
  transition:.3s;
}

.nav-menu a:hover,
.nav-menu a.active{
  background:rgba(255,255,255,.18);
  color:white;
}

.nav-menu a.dashboard-btn{
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.08);
  font-weight:600;
  margin-bottom:4px;
}
.nav-menu a.dashboard-btn:hover{ background:rgba(255,255,255,.2); }

/* MAIN - Fondo con imagen visible y overlay verde suave */
.main-content{
  margin-left:240px;
  flex:1;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,#a5d6a7 0%,#c8e6c9 40%,#e8f5e9 100%);
}

.main-content::before{
  content:'';
  position:absolute;
  inset:0;
  background:url('https://images.unsplash.com/photo-1545300329-e785e923ed45?w=1920&q=80'),url('/images/FONDODEFINITIVO.JPG') center/cover no-repeat;
  background-size:cover;
  background-position:center;
  filter:blur(3px) brightness(0.98) saturate(1.15);
  transform:scale(1.05);
  z-index:0;
}

.main-content::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(160deg,rgba(232,245,240,.28) 0%,rgba(255,255,255,.22) 50%,rgba(200,230,201,.3) 100%);
  z-index:1;
}

.content-wrap{
  position:relative;
  z-index:2;
  width:100%;
  max-width:600px;
}

/* CARD */
.card{
  background:var(--blanco);
  border-radius:20px;
  padding:40px;
  box-shadow:0 15px 40px rgba(0,0,0,.15);
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:translateY(0)}
}

.card h2{
  color:var(--verde);
  margin-bottom:30px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* PROFILE ROW */
.profile-row{
  display:flex;
  align-items:center;
  gap:15px;
  padding:18px 0;
  border-bottom:1px solid var(--borde);
}

.profile-row:last-child{border-bottom:none}

.profile-row i{
  font-size:22px;
  color:var(--verde);
  background:var(--verde-claro);
  padding:10px;
  border-radius:50%;
}

.label{
  font-size:12px;
  text-transform:uppercase;
  color:var(--gris);
  letter-spacing:.5px;
}

.value{
  font-weight:600;
  margin-top:4px;
}

/* BOTONES */
.btn-wrap{
  margin-top:30px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  text-align:center;
  padding:14px;
  border-radius:12px;
  font-weight:600;
  text-decoration:none;
  transition:.3s;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
}

.btn-primary{
  background:var(--verde);
  color:white;
}

.btn-primary:hover{
  background:var(--verde-oscuro);
  transform:translateY(-2px);
}

.btn-secondary{
  background:#f1f3f5;
  color:#333;
}

.btn-secondary:hover{
  background:#e9ecef;
  transform:translateY(-2px);
}

/* FOOTER */
.card-footer{
  margin-top:30px;
  padding-top:20px;
  border-top:1px solid var(--borde);
  text-align:center;
  font-size:13px;
  color:var(--gris);
}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .main-content{margin-left:0}
}
</style>
</head>

<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1><i class="ri-leaf-line"></i> AgroSoft</h1>
    <span class="role-badge" th:text="${rolNombre}">Usuario</span>
  </div>

  <ul class="nav-menu">
    <li><a th:href="@{/dashboard}" class="dashboard-btn"><i class="ri-dashboard-line"></i> Ver Dashboard</a></li>
    <li><a th:href="@{/cuenta}" class="active"><i class="ri-user-settings-line"></i> Mi cuenta</a></li>
    <li><a th:href="@{/cuenta/editar}"><i class="ri-edit-line"></i> Editar perfil</a></li>
    <li><a th:href="@{/cuenta/cambiar-password}"><i class="ri-lock-password-line"></i> Cambiar contraseña</a></li>
    <li><a th:href="@{/logout}"><i class="ri-logout-box-r-line"></i> Cerrar sesión</a></li>
  </ul>
</aside>

<div class="main-content">
  <div class="content-wrap">
    <div class="card">
      <h2><i class="ri-profile-line"></i> Datos del Perfil</h2>

      <div class="profile-row">
        <i class="ri-user-line"></i>
        <div>
          <div class="label">Nombre</div>
          <div class="value" th:text="${usuario.nombre}">Juan Pérez</div>
        </div>
      </div>

      <div class="profile-row">
        <i class="ri-mail-line"></i>
        <div>
          <div class="label">Correo</div>
          <div class="value" th:text="${usuario.correo}">correo@email.com</div>
        </div>
      </div>

      <div class="profile-row">
        <i class="ri-phone-line"></i>
        <div>
          <div class="label">Teléfono</div>
          <div class="value" th:text="${usuario.telefono}">999999999</div>
        </div>
      </div>

      <div class="profile-row">
        <i class="ri-shield-user-line"></i>
        <div>
          <div class="label">Rol</div>
          <div class="value" th:text="${rolNombre}">Administrador</div>
        </div>
      </div>

      <div class="btn-wrap">
        <a th:href="@{/cuenta/editar}" class="btn btn-primary">
          <i class="ri-edit-line"></i> Editar Perfil
        </a>

        <a th:href="@{/cuenta/cambiar-password}" class="btn btn-secondary">
          <i class="ri-lock-password-line"></i> Cambiar Contraseña
        </a>
      </div>

      <div class="card-footer">
        © 2024 AgroSoft - Todos los derechos reservados
      </div>
    </div>
  </div>
</div>

</body>
</html>
