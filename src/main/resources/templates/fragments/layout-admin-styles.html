<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>
  <!-- Incluir en <head> para páginas con sidebar: th:replace="~{fragments/layout-admin-styles :: admin-styles}" -->
  <th:block th:fragment="admin-styles">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <style>
      :root {
        --verde: #2F5D39;
        --verde-oscuro: #1e4620;
        --verde-claro: #CFE6AD;
        --texto-principal: #1F1F1F;
        --texto-secundario: #6F6F6F;
        --bordes-cards: #E8E8E8;
        --fondo: #FFFFFF;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Inter', sans-serif; background: var(--fondo); min-height: 100vh; display: flex; color: var(--texto-principal); }
      .sidebar.sidebar-agrosoft, .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 200px;
        height: 100vh;
        overflow-y: auto;
        background: var(--verde);
        color: white;
        padding: 30px 20px;
        border-radius: 0;
        box-shadow: none;
        z-index: 1000;
      }
      .sidebar-header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
      .sidebar-header h1 { font-size: 20px; font-weight: 700; color: white; margin-bottom: 8px; }
      .sidebar-header .role-badge { display: inline-block; padding: 4px 12px; background: rgba(255,255,255,0.15); border-radius: 12px; font-size: 11px; font-weight: 600; color: white; }
      .nav-menu { list-style: none; }
      .nav-menu li { margin-bottom: 8px; }
      .nav-menu a { display: flex; align-items: center; padding: 12px 16px; color: rgba(255,255,255,0.85); text-decoration: none; border-radius: 8px; transition: all 0.3s ease; font-size: 14px; font-weight: 500; }
      .nav-menu a i { margin-right: 12px; font-size: 18px; width: 20px; }
      .nav-menu a:hover, .nav-menu a.active { background: rgba(255,255,255,0.15); color: white; }
      .nav-menu .logout { margin-top: 20px; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2); }
      .nav-menu .logout:hover { background: rgba(255,255,255,0.1); }
      .main-content { margin-left: 200px; flex: 1; padding: 20px; min-height: 100vh; }
      @media (max-width: 768px) {
        .sidebar.sidebar-agrosoft { transform: translateX(-100%); transition: transform 0.3s ease; }
        .main-content { margin-left: 0; padding: 16px; }
      }
    </style>
  </th:block>
</body>
</html>
