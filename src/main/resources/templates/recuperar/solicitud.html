<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/images/cultivos.png" type="image/png">
  <title>Recuperar contraseña - AgroSoft</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root { --verde: #2F5D39; --verde-oscuro: #1e4620; --verde-claro: #e8f5f0; --gris-fondo: #f5f7fa; --gris-borde: #e9ecef; --texto: #1a1a1a; --texto-suave: #495057; --blanco: #fff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(140deg, var(--gris-fondo) 0%, var(--verde-claro) 100%); color: var(--texto); padding: 24px; }
    .card { background: var(--blanco); border-radius: 20px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 20px 50px rgba(47,93,57,0.12); }
    .card h1 { color: var(--verde); font-size: 24px; margin-bottom: 8px; }
    .card .sub { color: var(--texto-suave); font-size: 14px; margin-bottom: 24px; }
    .feedback { padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
    .feedback.error { background: #f8d7da; color: #721c24; }
    .feedback.success { background: var(--verde-claro); color: var(--verde-oscuro); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--gris-borde); border-radius: 10px; font-size: 15px; }
    .btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; background: var(--verde); color: white; width: 100%; }
    .link { display: block; text-align: center; margin-top: 20px; color: var(--verde); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Recuperar contraseña</h1>
    <p class="sub">Indica tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
    <div th:if="${error}" class="feedback error" th:text="${error}"></div>
    <div th:if="${success}" class="feedback success" th:text="${success}"></div>
    <form th:action="@{/recuperar}" method="post">
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" required placeholder="tu@correo.com">
      </div>
      <button type="submit" class="btn">Enviar enlace</button>
    </form>
    <a th:href="@{/login}" class="link">Volver al inicio de sesión</a>
  </div>
</body>
</html>
