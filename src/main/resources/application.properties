# ============================================
# CONFIGURACIÓN DE BASE DE DATOS MYSQL (XAMPP)
# ============================================
# XAMPP: Inicia MySQL desde el panel de XAMPP antes de ejecutar la app.
# 1. Abre XAMPP Control Panel y arranca "MySQL".
# 2. Por defecto usuario=root, contraseña vacía. Si en XAMPP usas contraseña "root", ponla abajo.
# 3. La base de datos debe coincidir con la que usas (agrostf).
# ============================================

# URL de conexión a MySQL (XAMPP: localhost:3306) - nombre de BD: agrostf
spring.datasource.url=jdbc:mysql://localhost:3306/agrostf?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
# XAMPP suele usar contraseña vacía. Si la tienes puesta (ej: root), usa: spring.datasource.password=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración del pool de conexiones HikariCP
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================
# CONFIGURACIÓN DE JPA/HIBERNATE
# ============================================
# ddl-auto=update: Actualiza el esquema (crea tablas nuevas si no existen)
# IMPORTANTE: Después de crear la tabla plantillas_correo, puedes volver a cambiar a 'none'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Inicialización de datos SQL (deshabilitado porque usamos CommandLineRunner)
spring.sql.init.mode=never

# Permitir referencias circulares (necesario para algunas dependencias)
spring.main.allow-circular-references=true

# ============================================
# CONFIGURACIÓN DEL SERVIDOR
# ============================================
# Si el puerto 8085 está ocupado, cambiar a otro (8086, 8087, etc.)
# Verificar puerto ocupado: netstat -ano | findstr :8085
server.port=8085
# Páginas de error personalizadas (CustomErrorController)
server.error.whitelabel.enabled=false

# ============================================
# CONFIGURACIÓN DE SESIÓN Y SEGURIDAD
# ============================================
# Timeout de sesión: 30 minutos (1800 segundos)
# Cambiar aquí si quieres un tiempo menor (ej: 10m, 5m)
# Debe coincidir con app.session.timeout.minutes para el script de protección
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.max-age=1800

# Tiempo de inactividad (minutos) para cerrar sesión en el cliente
# Debe coincidir con server.servlet.session.timeout
app.session.timeout.minutes=30

# ============================================
# CONFIGURACIÓN DE THYMELEAF (DESARROLLO)
# ============================================
# Deshabilitar cache de plantillas para ver cambios en tiempo real
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# ============================================
# CONFIGURACIÓN DE LOGGING
# ============================================
# Nivel de logging para depuración SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=INFO
logging.level.com.example.agrosoft1=DEBUG
# Ver en consola el motivo del fallo al iniciar sesión (quitar cuando ya funcione)
logging.level.org.springframework.security.web.authentication=DEBUG
logging.level.org.springframework.security.authentication=DEBUG

# Configuración de archivo de log
# Los logs se guardarán en: logs/agrosoft.log
logging.file.name=logs/agrosoft.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# CORREO: si defines RESEND_API_KEY se usa Resend; si no, Gmail SMTP (local).
# ============================================
app.resend.api.key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:}
# Gmail (local): SPRING_MAIL_USERNAME / SPRING_MAIL_PASSWORD — no subir al repo
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================
# CONFIGURACIÓN DE API DEL CLIMA (Web Service)
# ============================================
# API del clima - OpenWeatherMap
# Para obtener una API key gratuita: https://openweathermap.org/api
# INSTRUCCIONES: Ver archivo CONFIGURAR_API_CLIMA_REAL.md
# ============================================
# IMPORTANTE: Reemplaza "demo_key" con tu API key real para obtener datos reales
app.clima.api.key=demo_key
app.clima.api.url=https://api.openweathermap.org/data/2.5

# Configuración mejorada del servicio de clima
# Timeout para peticiones HTTP (segundos)
app.clima.timeout.seconds=5
# Habilitar cache (10 minutos de expiración)
app.clima.cache.enabled=true
